<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MU'UJIZA Ward/IPD – Admin</title>
<meta http-equiv="X-Frame-Options" content="DENY">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0e1320;--card:#161c2c;--field:#1e2538;--border:#2a324a;--text:#e8ecf4;--muted:#8b93a8;
    --accent:#38bdf8;--accent-dark:#0ea5e9;--green:#3ddc97;--error:#ff6b6b;--warn:#ffb347;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
  nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;}
  .nav-brand{font-weight:700;font-size:1rem;color:var(--accent);}
  .logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:0.78rem;padding:6px 12px;border-radius:7px;cursor:pointer;font-family:inherit;}
  .wrap{max-width:1150px;margin:0 auto;padding:16px;}
  .tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .tab-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:9px 18px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.86rem;}
  .tab-btn.active{background:var(--accent);color:#04131d;font-weight:700;border-color:var(--accent);}
  .panel{display:none;} .panel.active{display:block;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
  .card h2{font-size:0.92rem;margin:0 0 12px;color:var(--accent);display:flex;align-items:center;gap:8px;justify-content:space-between;}
  .search-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .search-row input,.search-row select{flex:1;min-width:150px;}
  input,select{background:var(--field);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:inherit;font-size:0.86rem;width:100%;}
  input:focus,select:focus{outline:none;border-color:var(--accent);}
  button{font-family:inherit;font-size:0.86rem;border:none;border-radius:8px;padding:9px 16px;cursor:pointer;}
  .btn-primary{background:var(--accent);color:#04131d;font-weight:700;}
  .btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-warn{background:var(--warn);color:#1a0e00;font-weight:700;}
  .btn-error{background:var(--error);color:#2a0000;font-weight:700;}
  .btn-small{padding:5px 10px;font-size:0.76rem;}
  table{width:100%;border-collapse:collapse;font-size:0.82rem;}
  th,td{text-align:left;padding:8px;border-bottom:1px solid var(--border);}
  th{color:var(--muted);font-size:0.72rem;text-transform:uppercase;}
  .status-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:0.68rem;font-weight:600;}
  .status-badge.available,.status-badge.active,.status-badge.admitted{background:rgba(61,220,151,0.15);color:var(--green);}
  .status-badge.occupied,.status-badge.pending_bed{background:rgba(255,179,71,0.15);color:var(--warn);}
  .status-badge.maintenance,.status-badge.disabled,.status-badge.discharged{background:rgba(255,107,107,0.15);color:var(--error);}
  .status-badge.transferred{background:rgba(56,189,248,0.15);color:var(--accent);}
  .empty{color:var(--muted);text-align:center;padding:24px;}
  .scroll-x{overflow-x:auto;}
  .msg{padding:10px;border-radius:8px;font-size:0.84rem;margin-bottom:12px;display:none;}
  .msg.show{display:block;}
  .msg.error{background:rgba(255,107,107,0.1);border:1px solid var(--error);color:var(--error);}
  .msg.success{background:rgba(61,220,151,0.1);border:1px solid var(--green);color:var(--green);}
  .field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
  label{font-size:0.74rem;color:var(--muted);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .grid3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;}

  .ward-card{background:var(--field);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
  .ward-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;flex-wrap:wrap;gap:6px;}
  .ward-name{font-weight:700;font-size:0.9rem;}
  .ward-dept{color:var(--muted);font-size:0.76rem;margin-left:6px;}
  .bed-tally{display:flex;gap:10px;font-size:0.76rem;color:var(--muted);}
  .bed-tally b{color:var(--text);}
  .ward-body{display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:10px;}
  .ward-body.open{display:block;}
  .bed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:10px;}
  .bed-chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:0.76rem;}
  .bed-chip .bn{font-family:'DM Mono',monospace;font-weight:600;}
  .bed-chip select{margin-top:4px;font-size:0.72rem;padding:4px 6px;}
  .add-beds-row{display:flex;gap:8px;align-items:flex-end;}
  .add-beds-row .field{flex:1;margin-bottom:0;}
</style>
</head>
<body>
<nav>
  <span class="nav-brand">🛏️ MU'UJIZA Ward/IPD — Admin</span>
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:0.76rem;color:var(--muted);" id="userLabel"></span>
    <button class="logout-btn" id="logoutBtn">Log out</button>
  </div>
</nav>
<div class="wrap">
  <div class="tabs">
    <button class="tab-btn active" data-tab="wards">Wards &amp; Beds</button>
    <button class="tab-btn" data-tab="admissions">Admission History</button>
    <button class="tab-btn" data-tab="staff">Staff Accounts</button>
  </div>
  <div class="msg error" id="errorMsg"></div>
  <div class="msg success" id="successMsg"></div>

  <!-- WARDS & BEDS -->
  <div class="panel active" id="panel-wards">
    <div class="card">
      <h2>Create Ward</h2>
      <div class="grid3">
        <div class="field"><label>Ward Name</label><input type="text" id="newWardName" placeholder="e.g. Male Medical Ward"></div>
        <div class="field"><label>Department</label><input type="text" id="newWardDept" placeholder="e.g. Internal Medicine"></div>
        <div class="field"><label>Initial Beds</label><input type="number" id="newWardBeds" min="0" value="0"></div>
      </div>
      <div style="display:flex;justify-content:flex-end;">
        <button class="btn-primary" id="createWardBtn">Create Ward</button>
      </div>
    </div>

    <div class="card">
      <h2>Wards</h2>
      <div id="wardsList"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <!-- ADMISSION HISTORY -->
  <div class="panel" id="panel-admissions">
    <div class="card">
      <h2>Admission History</h2>
      <div class="search-row">
        <input type="text" id="admSearch" placeholder="Hospital No...">
        <select id="admStatusFilter">
          <option value="">All statuses</option>
          <option value="pending_bed">Pending Bed</option>
          <option value="admitted">Admitted</option>
          <option value="discharged">Discharged</option>
          <option value="transferred">Transferred</option>
        </select>
        <button class="btn-primary" id="searchAdmBtn">Search</button>
        <button class="btn-ghost" id="clearAdmBtn">Clear</button>
      </div>
      <div class="scroll-x">
        <table><thead><tr>
          <th>Hospital No</th><th>Ward</th><th>Bed</th><th>Doctor</th><th>Diagnosis</th>
          <th>Status</th><th>Admitted</th><th>Discharged</th>
        </tr></thead>
        <tbody id="admTbody"><tr><td colspan="8" class="empty">Loading...</td></tr></tbody></table>
      </div>
    </div>
  </div>

  <!-- STAFF -->
  <div class="panel" id="panel-staff">
    <div class="card">
      <h2>Create Ward Staff Account</h2>
      <div class="grid2">
        <div class="field"><label>Username</label><input type="text" id="newUsername"></div>
        <div class="field"><label>Password</label><input type="password" id="newPassword"></div>
        <div class="field" style="grid-column:1/-1"><label>Role</label>
          <select id="newRole"><option value="ward_nurse">Ward Nurse</option><option value="ward_admin">Ward Admin</option></select>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:6px;">
        <button class="btn-primary" id="createUserBtn">Create Account</button>
      </div>
    </div>
    <div class="card">
      <h2>Ward Staff</h2>
      <div class="scroll-x">
        <table><thead><tr><th>Username</th><th>Role</th><th>Status</th><th>Created</th><th></th></tr></thead>
        <tbody id="staffTbody"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody></table>
      </div>
    </div>
  </div>
</div>
<script src="ward-auth-guard.js"></script>
<script src="ward-admin.js"></script>
</body>
</html>
