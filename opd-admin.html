<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MU'UJIZA OPD – Admin</title>
<meta http-equiv="X-Frame-Options" content="DENY">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0e1320;--card:#161c2c;--field:#1e2538;--border:#2a324a;--text:#e8ecf4;--muted:#8b93a8;--accent:#38bdf8;--accent-dark:#0ea5e9;--green:#3ddc97;--error:#ff6b6b;--warn:#ffb347;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);}
  nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;}
  .nav-brand{font-weight:700;font-size:1rem;color:var(--accent);}
  .logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:0.78rem;padding:6px 12px;border-radius:7px;cursor:pointer;font-family:inherit;}
  .wrap{max-width:1100px;margin:0 auto;padding:16px;}
  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tab-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:9px 18px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.86rem;}
  .tab-btn.active{background:var(--accent);color:#04131d;font-weight:700;border-color:var(--accent);}
  .panel{display:none;} .panel.active{display:block;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
  .card h2{font-size:0.92rem;margin:0 0 12px;color:var(--accent);}
  .search-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .search-row input{flex:1;min-width:180px;}
  input,select{background:var(--field);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:inherit;font-size:0.86rem;}
  button{font-family:inherit;font-size:0.86rem;border:none;border-radius:8px;padding:9px 16px;cursor:pointer;}
  .btn-primary{background:var(--accent);color:#04131d;font-weight:700;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-small{padding:5px 10px;font-size:0.76rem;}
  table{width:100%;border-collapse:collapse;font-size:0.82rem;}
  th,td{text-align:left;padding:8px;border-bottom:1px solid var(--border);}
  th{color:var(--muted);font-size:0.72rem;text-transform:uppercase;}
  .triage-badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:0.68rem;font-weight:600;}
  .triage-badge.emergency{background:rgba(255,107,107,0.15);color:var(--error);}
  .triage-badge.urgent{background:rgba(255,179,71,0.15);color:var(--warn);}
  .triage-badge.routine{background:rgba(61,220,151,0.15);color:var(--green);}
  .status-badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:0.68rem;}
  .status-badge.queued{color:var(--muted);}
  .status-badge.vitals_taken{color:var(--accent);}
  .status-badge.with_doctor{color:var(--green);}
  .status-badge.done{color:var(--muted);}
  .empty{color:var(--muted);text-align:center;padding:24px;}
  .scroll-x{overflow-x:auto;}
  .msg{padding:10px;border-radius:8px;font-size:0.84rem;margin-bottom:12px;display:none;}
  .msg.show{display:block;}
  .msg.error{background:rgba(255,107,107,0.1);border:1px solid var(--error);color:var(--error);}
  .msg.success{background:rgba(61,220,151,0.1);border:1px solid var(--green);color:var(--green);}
  .field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
  label{font-size:0.74rem;color:var(--muted);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
</style>
</head>
<body>
<nav>
  <span class="nav-brand">🏥 MU'UJIZA OPD — Admin</span>
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:0.76rem;color:var(--muted);" id="userLabel"></span>
    <button class="logout-btn" id="logoutBtn">Log out</button>
  </div>
</nav>
<div class="wrap">
  <div class="tabs">
    <button class="tab-btn active" data-tab="visits">Visit History</button>
    <button class="tab-btn" data-tab="staff">Staff Accounts</button>
  </div>
  <div class="msg error" id="errorMsg"></div>
  <div class="msg success" id="successMsg"></div>

  <!-- VISITS -->
  <div class="panel active" id="panel-visits">
    <div class="card">
      <h2>OPD Visit History</h2>
      <div class="search-row">
        <input type="date" id="visitDate">
        <input type="text" id="visitSearch" placeholder="Hospital No. or name...">
        <button class="btn-primary" id="searchVisitsBtn">Search</button>
        <button class="btn-ghost" id="clearVisitsBtn">Clear</button>
      </div>
      <div class="scroll-x">
        <table><thead><tr>
          <th>Hospital No</th><th>Patient</th><th>Triage</th><th>Status</th>
          <th>Chief Complaint</th><th>Nurse</th><th>Doctor</th><th>Time</th>
        </tr></thead>
        <tbody id="visitsTbody"><tr><td colspan="8" class="empty">Search to view visits</td></tr></tbody></table>
      </div>
    </div>
  </div>

  <!-- STAFF -->
  <div class="panel" id="panel-staff">
    <div class="card">
      <h2>Create OPD Staff Account</h2>
      <div class="grid2">
        <div class="field"><label>Username</label><input type="text" id="newUsername"></div>
        <div class="field"><label>Password</label><input type="password" id="newPassword"></div>
        <div class="field" style="grid-column:1/-1"><label>Role</label>
          <select id="newRole"><option value="opd_nurse">OPD Nurse</option><option value="opd_admin">OPD Admin</option></select>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:6px;">
        <button class="btn-primary" id="createUserBtn">Create Account</button>
      </div>
    </div>
    <div class="card">
      <h2>OPD Staff</h2>
      <div class="scroll-x">
        <table><thead><tr><th>Username</th><th>Role</th><th>Status</th><th>Created</th><th></th></tr></thead>
        <tbody id="staffTbody"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody></table>
      </div>
    </div>
  </div>
</div>
<script src="opd-auth-guard.js"></script>
<script src="opd-admin.js"></script>
</body>
</html>
