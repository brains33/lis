<title>MU'UJIZA LIS – Patient Portal</title>
<style>
:root { 
  --primary: #1F6E43; 
  --primary-dark: #155a38; 
  --bg: #eef2f9; 
  --surface: white; 
  --text: #1a2c3e; 
  --text2: #5a7e94; 
  --text3: #7f9eb0; 
  --border: #e2edf2; 
  --red-light: #dc2626; 
  --yellow-light: #d97706; 
  --green-glow: #10b981; 
  --mono: 'DM Mono', monospace;
  /* Add these for global components */
  --green: #1F6E43;
  --green-d: #155a38;
  --green-l: #e8f4ed;
  --slate: #1e2a35;
  --muted: #5a7e94;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'DM Sans',system-ui,sans-serif; }
body { background:var(--bg); padding:20px; color:var(--text); }
.app { max-width:1400px; margin:0 auto; }
.topbar { display:flex; justify-content:space-between; align-items:center; background:var(--surface); padding:12px 24px; border-radius:28px; margin-bottom:24px; border:1px solid var(--border); }
.brand-name { font-weight:800; font-size:1.3rem; background:linear-gradient(135deg,#1F4E6E,#2C7A5E); background-clip:text; -webkit-background-clip:text; color:transparent; }
.topbar-clock { font-family:var(--mono); font-size:0.9rem; background:#f0f4f9; padding:4px 12px; border-radius:40px; }
.topbar-user { display:flex; align-items:center; gap:12px; }
.logout-btn { background:none; border:1px solid var(--border); padding:6px 14px; border-radius:40px; cursor:pointer; }
.card { background:var(--surface); border-radius:28px; border:1px solid var(--border); margin-bottom:24px; overflow:hidden; }
.card-header { padding:16px 24px; border-bottom:1px solid var(--border); font-weight:600; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.card-body { padding:20px 24px; }
.unit-group { margin-bottom:24px; }
.unit-title { font-size:1rem; font-weight:700; color:var(--primary); border-left:4px solid var(--primary); padding-left:12px; margin-bottom:12px; }
.param-table { width:100%; border-collapse:collapse; margin:8px 0; font-size:0.8rem; }
.param-table th, .param-table td { padding:6px 8px; text-align:left; border-bottom:1px solid var(--border); }
.flag-high { font-weight:700; color:var(--red-light); }
.flag-low  { font-weight:700; color:#3b82f6; }
.result-block { border:1px solid var(--border); border-radius:20px; margin-bottom:20px; overflow:hidden; background:var(--surface); }
.result-block-head { padding:14px 20px; background:#f8fafb; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.result-block-body { padding:20px; }
.toast-stack { position:fixed; bottom:20px; right:20px; z-index:1100; }
.toast { background:var(--text); color:white; padding:10px 20px; border-radius:60px; margin-top:8px; font-size:0.85rem; animation:fadeIn 0.2s; }
.toast.error { background:#dc2626; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px);}to{opacity:1;} }
.btn { padding:8px 20px; border-radius:40px; border:none; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:8px; transition:0.15s; }
.btn-primary  { background:var(--primary); color:white; }
.btn-primary:hover { background:var(--primary-dark); }
.btn-secondary{ background:#eef2f7; color:var(--text2); }
.btn-secondary:hover { background:#dce6ef; }
.btn-sm { padding:5px 12px; font-size:0.75rem; }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-input { padding:9px 14px; border-radius:14px; border:1.5px solid var(--border); background:white; font-size:0.85rem; outline:none; }
.form-label { font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--text2); display:block; margin-bottom:4px; }
.badge { display:inline-block; padding:4px 12px; border-radius:40px; font-size:0.7rem; font-weight:600; }
.badge-paid      { background:#dcfce7; color:#15803d; }
.badge-partial   { background:#fef3c7; color:#92400e; }
.badge-unpaid    { background:#fee2e2; color:#b91c1c; }
/* Progress tracker styles */
.progress-tracker { background:#f9fafb; border-radius:16px; padding:12px 16px; margin-bottom:16px; }
.progress-steps { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-top:8px; }
.step { flex:1; text-align:center; font-size:0.7rem; color:var(--text2); position:relative; min-width:70px; }
.step .step-icon { width:28px; height:28px; background:white; border:2px solid var(--border); border-radius:50%; display:inline-flex; align-items:center; justify-content:center; margin-bottom:4px; font-size:0.7rem; color:var(--text2); background:white; transition:all 0.2s; }
.step.completed .step-icon { background:var(--green-glow); border-color:var(--green-glow); color:white; }
.step.active .step-icon { border-color:var(--primary); background:var(--primary); color:white; box-shadow:0 0 0 2px rgba(31,110,67,0.2); }
.step .step-label { font-weight:500; }
.step.completed .step-label { color:var(--green-glow); }
.step.active .step-label { color:var(--primary); font-weight:700; }
.status-badge { display:inline-block; padding:4px 12px; border-radius:40px; font-size:0.75rem; font-weight:700; margin-top:6px; }
.status-collected { background:#e0f2fe; color:#0c6b8f; }
.status-processing { background:#fff1df; color:#c47b2e; }
.status-verifying { background:#fef3c7; color:#92400e; }
.status-released { background:#dcfce7; color:#15803d; }
/* Global notification panel styles */
.global-notification-panel {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 350px;
  max-width: calc(100vw - 40px);
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  z-index: 1000;
  border: 1px solid var(--border);
  transition: all 0.3s ease;
}

.notification-header {
  background: var(--green);
  color: white;
  padding: 12px 16px;
  border-radius: 20px 20px 0 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.85rem;
}

.notification-header i {
  transition: transform 0.3s;
}

.notification-header.collapsed i {
  transform: rotate(180deg);
}

.notification-content {
  max-height: 400px;
  overflow-y: auto;
  padding: 12px;
  display: block;
}

.notification-content.collapsed {
  display: none;
}

.notification-message {
  background: #f8fafb;
  border-radius: 12px;
  padding: 10px 12px;
  margin-bottom: 10px;
  border-left: 3px solid var(--green);
  font-size: 0.8rem;
}

.notification-message.pinned {
  background: #fff7ed;
  border-left-color: #f59e0b;
}

.notification-message .message-text {
  margin-bottom: 5px;
  color: var(--slate);
}

.notification-message .message-meta {
  font-size: 0.65rem;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.send-message-form {
  display: flex;
  gap: 8px;
  padding: 8px;
  border-top: 1px solid var(--border);
  background: #f9fafb;
  border-radius: 0 0 20px 20px;
}

.send-message-form input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 0.8rem;
  outline: none;
}

.send-message-form button {
  background: var(--green);
  color: white;
  border: none;
  border-radius: 20px;
  padding: 8px 16px;
  cursor: pointer;
  font-size: 0.75rem;
  font-weight: 600;
}

.send-message-form button:hover {
  background: var(--green-d);
}

.unread-badge {
  background: #ef4444;
  color: white;
  border-radius: 10px;
  padding: 2px 6px;
  font-size: 0.7rem;
  margin-left: 8px;
}

/* Global sample search */
.global-sample-search {
  position: fixed;
  top: 70px;
  right: 20px;
  width: 300px;
  z-index: 999;
}

.search-container {
  background: white;
  border-radius: 40px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 4px 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.search-container input {
  flex: 1;
  border: none;
  padding: 8px 8px 8px 4px;
  font-size: 0.8rem;
  outline: none;
}

.search-container button {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--green);
  padding: 6px;
}

.search-results-dropdown {
  position: absolute;
  top: 100%;
  right: 0;
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  width: 100%;
  max-height: 300px;
  overflow-y: auto;
  margin-top: 8px;
  display: none;
  z-index: 1000;
}

.search-results-dropdown.show {
  display: block;
}

.search-result-item {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  font-size: 0.8rem;
}

.search-result-item:hover {
  background: var(--green-l);
}

.search-result-item .sample-id {
  font-weight: 700;
  color: var(--green);
}

.search-result-item .sample-patient {
  color: var(--slate);
  font-size: 0.75rem;
}

<script>
const SUPABASE_URL      = 'https://npdopywxemtwzvpummsn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wZG9weXd4ZW10d3p2cHVtbXNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzY0MjksImV4cCI6MjA5NTQ1MjQyOX0.Mo5LfGdfSiHL6QHsPOaGkDmeaIRDqZTe8MGwz_6ou1c';

// ========== HELPERS ==========
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, m =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
}
function toast(msg, type = 'success') {
  let stack = document.getElementById('toastStack');
  if (!stack) return;
  let div = document.createElement('div');
  div.className = `toast ${type}`;
  let icon = type === 'error' ? 'times-circle' : 'exclamation-circle';
  div.innerHTML = `<i class="fas fa-${icon}"></i> `;
  let span = document.createElement('span');
  span.textContent = msg;
  div.appendChild(span);
  stack.appendChild(div);
  setTimeout(() => { div.style.opacity = '0'; setTimeout(() => div.remove(), 300); }, 3500);
}
function payBadgeClass(paystatus) {
  if (paystatus === 'Paid')    return 'badge-paid';
  if (paystatus === 'Partial') return 'badge-partial';
  return 'badge-unpaid';
}
async function addAudit(action, sampleId, details) {
  try {
    await db.from('audit_log').insert([{
      ts: new Date().toISOString(),
      user_name: currentUser?.name || 'Unknown',
      user_role: currentUser?.role || 'Unknown',
      action: action,
      sample_id: sampleId,
      details: details || ''
    }]);
  } catch (err) { console.warn('Audit failed', err); }
}

const db = window._supabaseClient;

// ========== LOAD DATA ==========
let samples = [];
let testDefinitions = { testTypes: {}, testUnits: {} };

async function loadTestDefinitions() {
  try {
    const { data, error } = await db.from('test_definitions').select('*');
    if (error) throw error;
    testDefinitions = { testTypes: {}, testUnits: {} };
    data.forEach(td => {
      testDefinitions.testUnits[td.test_name] = td.unit_name || 'Other';
      if (td.test_type !== 'simple') {
        testDefinitions.testTypes[td.test_name] = td.test_type;
      }
    });
  } catch (err) {
    console.error(err);
    toast('Failed to load test definitions', 'error');
  }
}

async function loadSamples() {
  try {
    const { data, error } = await db
      .from('samples')
      .select('*, sample_tests(*)')
      .order('id', { ascending: false });
    if (error) throw error;
    samples = data.map(s => ({
      ...s,
      tests: s.sample_tests || [],
      stype: s.sample_type,
      due: s.due_date,
      paystatus: s.pay_status,
      paymode: s.pay_mode,
      insurance: s.insurance_no,
      collDate: s.collection_date,
      collTime: s.collection_time
    }));
  } catch (err) {
    console.error(err);
    toast('Failed to load samples', 'error');
    samples = [];
  }
}

// ========== DYNAMIC REFERENCE RANGE HELPER ==========
function getReferenceRange(testName, age, gender) {
  const patientAge = (age && !isNaN(age)) ? parseInt(age) : 30;
  const isMale = (gender === 'Male');
  const isFemale = (gender === 'Female');

  switch (testName) {
    case 'PCV':
    case 'Packed Cell Volume':
    case 'Hematocrit':
    case 'HCT':
      if (isMale) return { low: 40, high: 54, unit: '%' };
      if (isFemale) return { low: 36, high: 46, unit: '%' };
      return { low: 36, high: 46, unit: '%' };
    case 'Hb':
    case 'Hemoglobin':
      if (isMale) return { low: 13.5, high: 17.5, unit: 'g/dL' };
      if (isFemale) return { low: 12.0, high: 15.5, unit: 'g/dL' };
      return { low: 12.0, high: 15.5, unit: 'g/dL' };
    case 'ESR':
    case 'Erythrocyte Sedimentation Rate':
      if (isMale) return { low: 0, high: 10, unit: 'mm/hr' };
      if (isFemale) return { low: 0, high: 20, unit: 'mm/hr' };
      return { low: 0, high: 15, unit: 'mm/hr' };
    case 'RBS':
    case 'Random Blood Sugar':
      return { low: 70, high: 140, unit: 'mg/dL' };
    case 'FBS':
    case 'Fasting Blood Sugar':
      return { low: 70, high: 100, unit: 'mg/dL' };
    default:
      return null;
  }
}

// ========== PORTAL SEARCH (only released results) ==========
async function portalSearch() {
  await loadSamples();
  let sid  = document.getElementById('portalId').value.trim().replace(/MU-?/i, '');
  let name = document.getElementById('portalName').value.trim().toLowerCase();

  if (!sid && !name) {
    document.getElementById('portalResults').innerHTML =
      `<p style="color:var(--text2);">Enter a Sample ID or patient name to search.</p>`;
    return;
  }

  let released = samples.filter(s => s.status === 'Result Released');
  let matches = sid
    ? released.filter(s => s.id.toString() === sid)
    : released.filter(s => s.patient.toLowerCase().includes(name));

  let searchTerm = sid ? `Sample ID: MU-${sid}` : `Patient Name: ${name}`;
  await addAudit('Patient Portal Search', null, `${searchTerm} → ${matches.length} result(s) found`);

  let container = document.getElementById('portalResults');
  if (!container) return;
  if (!matches.length) {
    container.innerHTML = `<p style="color:var(--text3); margin-top:8px;">No released results found. Results only appear here after a supervisor authorises them.</p>`;
    return;
  }
  container.innerHTML = matches.map(s => buildResultCard(s)).join('');
}

function portalClear() {
  document.getElementById('portalId').value   = '';
  document.getElementById('portalName').value = '';
  document.getElementById('portalResults').innerHTML = '';
}

// ========== STATUS TRACKING HELPER ==========
function getStatusInfo(status) {
  const steps = [
    { key: 'Registered',    label: 'Registered',   icon: 'fa-clipboard-list' },
    { key: 'Collected',     label: 'Collected',    icon: 'fa-syringe' },
    { key: 'Processing',    label: 'Processing',   icon: 'fa-microscope' },
    { key: 'Verifying',     label: 'Verification', icon: 'fa-check-double' },
    { key: 'Result Released', label: 'Released',   icon: 'fa-file-pdf' }
  ];
  let currentStepIndex = 0;
  if (status === 'Collected') currentStepIndex = 1;
  else if (status === 'Processing') currentStepIndex = 2;
  else if (status === 'Verifying') currentStepIndex = 3;
  else if (status === 'Result Released') currentStepIndex = 4;
  let statusText = '';
  let statusClass = '';
  switch (status) {
    case 'Collected': statusText = 'Sample Collected'; statusClass = 'status-collected'; break;
    case 'Processing': statusText = 'Processing in Lab'; statusClass = 'status-processing'; break;
    case 'Verifying': statusText = 'Under Verification'; statusClass = 'status-verifying'; break;
    case 'Result Released': statusText = 'Results Ready'; statusClass = 'status-released'; break;
    default: statusText = status || 'Registered'; statusClass = 'status-collected';
  }
  return { steps, currentStepIndex, statusText, statusClass };
}

function getFlag(val, param) {
  let n = parseFloat(val);
  if (isNaN(n)) return '';
  if (param.high !== null && n > param.high) return '↑';
  if (param.low  !== null && n < param.low)  return '↓';
  return '';
}

// ========== GROUP TESTS BY UNIT ==========
function groupTestsByUnit(tests) {
  const groups = {};
  tests.forEach(test => {
    const unit = testDefinitions.testUnits[test.test_name] || 'General';
    if (!groups[unit]) groups[unit] = [];
    groups[unit].push(test);
  });
  return groups;
}

// ========== BUILD RESULT CARD (with progress tracker) ==========
function buildResultCard(s) {
  const groups = groupTestsByUnit(s.tests);
  let testSections = '';
  for (const [unitName, unitTests] of Object.entries(groups)) {
    testSections += `<div class="unit-group"><div class="unit-title">${esc(unitName)}</div>`;
    unitTests.forEach(t => {
      let testType = testDefinitions.testTypes[t.test_name] || '';
      if (!t.result || !t.result.startsWith('{')) {
        testSections += `
          <table class="param-table">
            <thead><tr><th>Parameter</th><th>Result</th><th>Unit</th><th>Reference</th></tr></thead>
            <tbody>
              <tr><td style="font-weight:500;">${esc(t.test_name)}</td><td>${esc(t.result || '—')}</td><td>—</td><td>—</td>
              </tr>
            </tbody>
          </table>`;
      } else {
        try {
          let data = JSON.parse(t.result);
          testSections += buildParamTable(t.test_name, data, testType, s.age, s.gender);
        } catch(e) {
          testSections += `<div><strong>${esc(t.test_name)}</strong><br>${esc(t.result)}</div>`;
        }
      }
    });
    testSections += `</div>`;
  }

  const { steps, currentStepIndex, statusText, statusClass } = getStatusInfo(s.status);
  const stepsHtml = steps.map((step, idx) => {
    let stepState = '';
    if (idx < currentStepIndex) stepState = 'completed';
    else if (idx === currentStepIndex) stepState = 'active';
    return `<div class="step ${stepState}">
      <div class="step-icon"><i class="fas ${step.icon}"></i></div>
      <div class="step-label">${step.label}</div>
    </div>`;
  }).join('');

  return `
    <div class="result-block">
      <div class="result-block-head">
        <div>
          <div style="font-weight:700;">MU-${s.id} — ${esc(s.patient)}</div>
          <div style="font-size:0.8rem; color:var(--text2); margin-top:2px;">
            ${s.age ?? '?'}y ${esc(s.gender)}
            &nbsp;|&nbsp; Collected: ${s.collection_date}
            &nbsp;|&nbsp; Released: ${s.released_at ? new Date(s.released_at).toLocaleString() : '—'}
          </div>
          ${s.clinician ? `<div style="font-size:0.8rem; color:var(--text2);">Clinician: ${esc(s.clinician)}</div>` : ''}
        </div>
        <div style="text-align:right;">
          <span class="badge ${payBadgeClass(s.pay_status)}">${esc(s.pay_status)}</span><br>
          <small style="color:var(--text2);">Paid: ${(s.amount_paid || 0).toFixed(2)} NGN | Balance: ${(s.balance_due || 0).toFixed(2)} NGN</small>
        </div>
      </div>
      <div class="result-block-body">
        <!-- Progress Tracker -->
        <div class="progress-tracker">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
            <span style="font-weight:600; font-size:0.8rem;">Sample Progress</span>
            <span class="status-badge ${statusClass}">${statusText}</span>
          </div>
          <div class="progress-steps">${stepsHtml}</div>
          <div style="font-size:0.7rem; color:var(--text2); margin-top:10px; text-align:center;">
            ${s.status === 'Result Released' ? 'Your results are ready for download.' : 'Your sample is being processed. You will be notified when results are ready.'}
          </div>
        </div>
        ${testSections}
        <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn btn-primary btn-sm" onclick="generatePDF(${s.id})">
            <i class="fas fa-file-pdf"></i> Download PDF
          </button>
        </div>
      </div>
    </div>`;
}

// ========== BUILD PARAM TABLE (handles culture sensitivities, urine/stool MCS, etc.) ==========
function buildParamTable(testName, data, testType, age, gender) {
  // Dynamic single‑parameter tests
  const dynamicTests = ['complex_pcv', 'complex_hb', 'complex_esr', 'complex_rbs', 'complex_fbs'];
  if (dynamicTests.includes(testType)) {
    let key = testType.split('_')[1];
    let val = data[key];
    if (val === undefined) val = '';
    let range = getReferenceRange(testName, age, gender);
    if (!range) range = { low: 0, high: 100, unit: '' };
    let flag = '';
    let num = parseFloat(val);
    if (!isNaN(num)) {
      if (num > range.high) flag = '↑';
      else if (num < range.low) flag = '↓';
    }
    let cls = flag === '↑' ? 'flag-high' : flag === '↓' ? 'flag-low' : '';
    return `
      <table class="param-table">
        <thead><tr><th>Parameter</th><th>Result</th><th>Unit</th><th>Reference</th></tr></thead>
        <tbody>
          <tr><td style="font-weight:500;">${esc(testName)}</td>
              <td class="${cls}">${val} ${flag}</td>
              <td>${esc(range.unit)}</td>
              <td>${range.low}–${range.high}</td>
          </tr>
        </tbody>
      </table>`;
  }

  // Culture & Sensitivity (general)
  if (testType === 'complex_culture' || testType === 'complex_stool_cs') {
    let organism = data.organism || 'Not specified';
    let sensRows = (data.sensitivities || []).map(s => {
      const label  = s.result === 'S' ? 'Sensitive' : s.result === 'R' ? 'Resistant' : s.result === 'I' ? 'Intermediate' : s.result || '—';
      const colour = s.result === 'S' ? '#15803d'   : s.result === 'R' ? '#b91c1c'   : s.result === 'I' ? '#92400e'      : '#374151';
      const bg     = s.result === 'S' ? '#dcfce7'   : s.result === 'R' ? '#fee2e2'   : s.result === 'I' ? '#fef3c7'      : '#f3f4f6';
      return `<tr>
        <td>${esc(s.antibiotic)}</td>
        <td style="font-weight:700; color:${colour};">${esc(s.result)}</td>
        <td><span style="display:inline-block; padding:2px 10px; border-radius:20px; background:${bg}; color:${colour}; font-size:0.78rem; font-weight:600;">${label}</span></td>
        <td></td>
      </tr>`;
    }).join('');
    return `
      <div style="margin-bottom:12px;">
        <strong>${esc(testName)}</strong>
        <table class="param-table">
          <thead><tr><th>Organism</th><th colspan="3"><em>${esc(organism)}</em></th></tr></thead>
          <tbody>
            ${sensRows
              ? `<tr style="background:#f0f0f0;"><th>Antibiotic</th><th>Result</th><th>Interpretation</th><th></th></tr>${sensRows}`
              : `<tr><td colspan="4" style="color:#6b7280;">No antibiotic sensitivities recorded.</td>`}
          </tbody>
        </table>
      </div>`;
  }

  // Urine MCS or Stool MCS
  if (testType === 'complex_urine_mcs' || testType === 'complex_stool_mcs') {
    const isMCS = testType === 'complex_urine_mcs';
    const MICRO_PARAMS = isMCS ? URINE_MICRO_PARAMS : STOOL_MICRO_PARAMS;
    const sections = isMCS ? ['Physical','Chemical','Microscopy'] : ['Macroscopy','Microscopy'];
    let html = `<div style="margin-bottom:4px;"><strong>${esc(testName)}</strong></div>`;
    sections.forEach(sec => {
      const secParams = MICRO_PARAMS.filter(p => p.section === sec);
      const secRows = secParams.map(p => {
        let v = data[p.key];
        if (v === undefined || v === '' || v === 'None' || v === 'None seen' || v === 'Absent' || v === 'Negative') return '';
        let flag = ''; let cls = '';
        if (p.type === 'number' && p.low !== undefined) {
          let n = parseFloat(v);
          if (!isNaN(n)) { if (n > p.high) { flag = '↑'; cls = 'flag-high'; } else if (n < p.low) { flag = '↓'; cls = 'flag-low'; } }
        }
        return `<tr><td>${esc(p.name)}</td><td class="${cls}">${esc(v)} ${flag}</td><td>${esc(p.unit||'')}</td><td>—</td></tr>`;
      }).filter(Boolean).join('');
      if (!secRows) return;
      html += `<table class="param-table">
        <thead><tr><th colspan="4" style="background:#dbeafe; text-align:left; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px;">${sec}</th></tr>
        <tr><th>Parameter</th><th>Result</th><th>Unit</th><th>Ref</th></tr></thead>
        <tbody>${secRows}</tbody>
      </table>`;
    });
    // C&S section
    const sensRows = (data.sensitivities || []).map(s => {
      const label  = s.result==='S'?'Sensitive':s.result==='R'?'Resistant':s.result==='I'?'Intermediate':s.result||'—';
      const colour = s.result==='S'?'#15803d':s.result==='R'?'#b91c1c':s.result==='I'?'#92400e':'#374151';
      const bg     = s.result==='S'?'#dcfce7':s.result==='R'?'#fee2e2':s.result==='I'?'#fef3c7':'#f3f4f6';
      return `<tr><td>${esc(s.antibiotic)}</td><td style="font-weight:700;color:${colour};">${esc(s.result)}</td>
        <td><span style="display:inline-block;padding:2px 10px;border-radius:20px;background:${bg};color:${colour};font-size:0.78rem;font-weight:600;">${label}</span></td><td></td></tr>`;
    }).join('');
    html += `<table class="param-table">
      <thead>
        <tr><th colspan="4" style="background:#dbeafe; text-align:left; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px;">Culture &amp; Sensitivity</th></tr>
        <tr><th>Organism</th><th colspan="3" style="font-style:italic; font-weight:400;">${esc(data.organism || 'No growth / Not specified')}</th></tr>
        ${sensRows ? '<tr style="background:#f0f0f0;"><th>Antibiotic</th><th>Result</th><th>Interpretation</th><th></th></tr>' : ''}
      </thead>
      <tbody>${sensRows || '<tr><td colspan="4" style="color:#6b7280;">No antibiotic sensitivities recorded.</td>'} </tbody>
    </table>`;
    return html;
  }

  // Widal
  if (testType === 'complex_widal') {
    const rows = [
      { organism: 'Salmonella Typhi',       o: data.o  ?? '—', h: data.h  ?? '—' },
      { organism: 'Salmonella Paratyphi A', o: data.ao ?? '—', h: data.ah ?? '—' },
      { organism: 'Salmonella Paratyphi B', o: data.bo ?? '—', h: data.bh ?? '—' },
      { organism: 'Salmonella Paratyphi C', o: data.co ?? '—', h: data.ch ?? '—' }
    ];
    let tableRows = '';
    for (let r of rows) {
      const oFlag    = (parseInt(r.o) >= 160) ? ' ↑' : '';
      const hFlag    = (parseInt(r.h) >= 160) ? ' ↑' : '';
      const oDisplay = r.o !== '—' ? `1:${r.o}${oFlag}` : '—';
      const hDisplay = r.h !== '—' ? `1:${r.h}${hFlag}` : '—';
      const oColour  = oFlag ? '#b91c1c' : 'inherit';
      const hColour  = hFlag ? '#b91c1c' : 'inherit';
      tableRows += `<tr>
        <td style="font-style:italic; font-weight:500; width:45%;">${r.organism}</td>
        <td style="text-align:center; width:27.5%; font-weight:${oFlag ? '700' : '400'}; color:${oColour};">${oDisplay}</td>
        <td style="text-align:center; width:27.5%; font-weight:${hFlag ? '700' : '400'}; color:${hColour};">${hDisplay}</td>
      <tr>`;
    }
    return `
      <table class="param-table" style="width:100%; table-layout:fixed; border-collapse:collapse;">
        <colgroup><col style="width:45%;"><col style="width:27.5%;"><col style="width:27.5%;"></colgroup>
        <thead><tr><th style="text-align:left; padding:8px 10px;">Organism</th><th style="text-align:center; padding:8px 10px;">O Antigen (TO)</th><th style="text-align:center; padding:8px 10px;">H Antigen (TH)</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>`;
  }

  // Malaria
  if (testType === 'complex_malaria') {
    let rows = '';
    if (data.species) rows += `<td>Species</td><td colspan="3">${esc(data.species)}</td><tr>`;
    if (data.stage) rows += `<td>Stage</td><td colspan="3">${esc(data.stage)}</td></tr>`;
    if (data.density !== undefined) rows += `<td>Parasite Density</td><td colspan="3">${esc(data.density)} parasites/µL</td></tr>`;
    return `<table class="param-table"><tbody>${rows}</tbody></table>`;
  }

  // TB GeneXpert
  if (testType === 'complex_tb_genexpert') {
    let rows = '';
    if (data.mtb_detected) rows += `<td>MTB Detected</td><td colspan="3">${esc(data.mtb_detected)}</td></tr>`;
    if (data.rif_resistance) rows += `<td>Rifampicin Resistance</td><td colspan="3">${esc(data.rif_resistance)}</td></tr>`;
    for (let probe of ['probeA_ct','probeB_ct','probeC_ct','probeD_ct','probeE_ct']) {
      if (data[probe] !== undefined) rows += `<td>${probe.replace('_ct',' Probe Ct')}</td><td colspan="3">${esc(data[probe])}</td></tr>`;
    }
    return `<table class="param-table"><tbody>${rows}</tbody></table>`;
  }

  // Serology
  if (testType === 'complex_serology') {
    let rows = '';
    for (let p of SEROLOGY_PARAMS) {
      if (data[p.key] !== undefined) rows += `<td>${esc(p.name)}</td><td colspan="3">${esc(data[p.key])}</td></tr>`;
    }
    return `<table class="param-table"><tbody>${rows}</tbody></table>`;
  }

  // Standard numeric panels
  let params = [];
  if (testType === 'complex_cbc') params = CBC_PARAMS;
  else if (testType === 'complex_lft') params = LFT_PARAMS_FULL;
  else if (testType === 'complex_rft') params = RFT_PARAMS_FULL;
  else if (testType === 'complex_thyroid') params = THYROID_PARAMS;
  else if (testType === 'complex_lipid') params = LIPID_PARAMS;
  else if (testType === 'complex_coag') params = COAG_PARAMS;
  else if (testType === 'complex_urinalysis') params = URINALYSIS_MICRO_PARAMS;
  else if (testType === 'complex_iron') params = IRON_PARAMS;
  else if (testType === 'complex_bone') params = BONE_PARAMS;
  else if (testType === 'complex_cardiac') params = CARDIAC_PARAMS;
  else if (testType === 'complex_ogtt') params = OGTT_PARAMS;
  else if (testType === 'complex_csf') params = CSF_PARAMS;
  else if (testType === 'complex_abg') params = ABG_PARAMS;
  else if (testType === 'complex_semen') params = SEMEN_PARAMS;

  if (!params.length) {
    let rows = Object.entries(data).map(([k, v]) => `<table><td colspan="2">${esc(k)}: ${esc(String(v))}</td><td colspan="2"></td></tr>`).join('');
    return `<table class="param-table"><tbody>${rows}</tbody></table>`;
  }

  let rows = '';
  for (let p of params) {
    let val = data[p.key];
    if (val === undefined || val === '') continue;
    let displayVal = val;
    let flag = '';
    let unit = p.unit || '';
    let ref = (p.low !== null && p.high !== null) ? `${p.low}–${p.high}` : (p.low !== null ? `≥${p.low}` : p.high !== null ? `≤${p.high}` : '—');
    if (p.type === 'number' || !p.type) {
      let n = parseFloat(val);
      if (!isNaN(n)) {
        if (p.high !== null && n > p.high) flag = '↑';
        if (p.low !== null && n < p.low) flag = '↓';
        displayVal = `${n} ${flag}`;
      }
    }
    let cls = flag === '↑' ? 'flag-high' : flag === '↓' ? 'flag-low' : '';
    rows += `<tr>
      <td>${esc(p.name)}</td>
      <td class="${cls}">${esc(displayVal)}</td>
      <td>${esc(unit)}</td>
      <td>${esc(ref)}</td>
    </tr>`;
  }
  return `<table class="param-table"><thead><tr><th>Parameter</th><th>Result</th><th>Unit</th><th>Reference</th></tr></thead><tbody>${rows}</tbody></td>`;
}

// ========== PDF GENERATION (multi‑page) ==========
async function generatePDF(id) {
  let s = samples.find(x => x.id === id);
  if (!s) return;
  const groups = groupTestsByUnit(s.tests);
  let rows = '';
  for (const [unitName, unitTests] of Object.entries(groups)) {
    rows += `<tr style="background:#e2e8f0;"><td colspan="4" style="padding:8px; font-weight:bold;">${esc(unitName)}</td></tr>`;
    for (let t of unitTests) {
      let testType = testDefinitions.testTypes[t.test_name] || '';
      if (!t.result || !t.result.startsWith('{')) {
        rows += `<tr><td style="padding:5px;">${esc(t.test_name)}</td><td colspan="3">${esc(t.result || '—')}</td></tr>`;
      } else {
        try {
          let data = JSON.parse(t.result);
          rows += generatePDFRows(t.test_name, data, testType, s.age, s.gender);
        } catch(e) {
          rows += `<tr><td colspan="4">${esc(t.test_name)}: ${esc(t.result)}</td></tr>`;
        }
      }
    }
  }

  let wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed; left:-9999px; top:0; width:800px; background:white; padding:30px; font-family:Arial; font-size:12px;';
  wrap.innerHTML = `
    <div style="text-align:center; margin-bottom:20px; border-bottom:2px solid #1F6E43; padding-bottom:16px;">
      <h1 style="color:#1F6E43;">MU'UJIZA DIAGNOSTICS</h1>
      <p style="font-size:11px;">Accredited Laboratory · ISO 15189</p>
    </div>
    <div style="margin-bottom:16px;">
      <p><strong>Sample ID:</strong> MU-${s.id}</p>
      <p><strong>Patient:</strong> ${esc(s.patient)} (${s.age ?? '?'}y, ${esc(s.gender)})</p>
      <p><strong>Collected:</strong> ${s.collection_date} | <strong>Released:</strong> ${s.released_at ? new Date(s.released_at).toLocaleString() : '—'}</p>
      <p><strong>Payment:</strong> ${s.pay_status} | Paid: ${(s.amount_paid || 0).toFixed(2)} NGN | Balance: ${(s.balance_due || 0).toFixed(2)} NGN</p>
      ${s.supervisor_comment ? `<p><strong>Supervisor Note:</strong> ${esc(s.supervisor_comment)}</p>` : ''}
    </div>
    <table border="1" style="border-collapse:collapse; width:100%;">
      <thead><tr style="background:#f0f0f0;"><th>Parameter</th><th>Result</th><th>Unit</th><th>Reference</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:20px; text-align:center; font-size:9px;">Electronically generated by MU'UJIZA DIAGNOSTICS LIS</div>`;
  document.body.appendChild(wrap);

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
  const canvas = await html2canvas(wrap, { scale: 2 });
  const imgData = canvas.toDataURL('image/png');
  const imgWidth = 190;
  const pageHeight = 277;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;
  let heightLeft = imgHeight;
  let position = 0;

  pdf.addImage(imgData, 'PNG', 10, position + 10, imgWidth, imgHeight);
  heightLeft -= pageHeight;
  while (heightLeft > 0) {
    position -= pageHeight;
    pdf.addPage();
    pdf.addImage(imgData, 'PNG', 10, position + 10, imgWidth, imgHeight);
    heightLeft -= pageHeight;
  }

  pdf.save(`MU${s.id}_${(s.patient || 'patient').replace(/\s/g, '_')}.pdf`);
  document.body.removeChild(wrap);
  await addAudit('PDF Downloaded', s.id, `Report downloaded by ${currentUser ? currentUser.name : 'Unknown'}`);
  toast('PDF downloaded');
}

function generatePDFRows(testName, data, testType, age, gender) {
  const dynamicTests = ['complex_pcv', 'complex_hb', 'complex_esr', 'complex_rbs', 'complex_fbs'];
  if (dynamicTests.includes(testType)) {
    let key = testType.split('_')[1];
    let val = data[key];
    if (val === undefined) val = '';
    let range = getReferenceRange(testName, age, gender);
    if (!range) range = { low: 0, high: 100, unit: '' };
    let flag = '';
    let num = parseFloat(val);
    if (!isNaN(num)) {
      if (num > range.high) flag = '↑';
      else if (num < range.low) flag = '↓';
    }
    return `<tr><td style="font-weight:bold;">${esc(testName)}</td><td>${val} ${flag}</td><td>${esc(range.unit)}</td><td>${range.low}–${range.high}</td></tr>`;
  }

  if (testType === 'complex_widal') {
    const rows = [
      { organism: 'Salmonella Typhi',       o: data.o  ?? '—', h: data.h  ?? '—' },
      { organism: 'Salmonella Paratyphi A', o: data.ao ?? '—', h: data.ah ?? '—' },
      { organism: 'Salmonella Paratyphi B', o: data.bo ?? '—', h: data.bh ?? '—' },
      { organism: 'Salmonella Paratyphi C', o: data.co ?? '—', h: data.ch ?? '—' }
    ];
    let tableRows = '';
    for (let r of rows) {
      const oFlag    = (parseInt(r.o) >= 160) ? ' ↑' : '';
      const hFlag    = (parseInt(r.h) >= 160) ? ' ↑' : '';
      const oDisplay = r.o !== '—' ? `1:${r.o}${oFlag}` : '—';
      const hDisplay = r.h !== '—' ? `1:${r.h}${hFlag}` : '—';
      const oColour  = oFlag ? '#b91c1c' : '#1a1a1a';
      const hColour  = hFlag ? '#b91c1c' : '#1a1a1a';
      tableRows += `<tr>
        <td style="padding:6px 10px; font-style:italic; width:44%;">${r.organism}</td>
        <td style="padding:6px 10px; text-align:center; width:28%; font-weight:${oFlag?'bold':'normal'}; color:${oColour};">${oDisplay}</td>
        <td style="padding:6px 10px; text-align:center; width:28%; font-weight:${hFlag?'bold':'normal'}; color:${hColour};">${hDisplay}</td>
      </tr>`;
    }
    return `
      <tr style="background:#e8f4f0;"><td colspan="4" style="font-weight:bold; padding:8px 10px; font-size:13px;">Widal Test</td></tr>
      <tr><td colspan="4" style="padding:6px 10px;">
        <table style="width:100%; border-collapse:collapse; table-layout:fixed; border:1px solid #d1d5db;">
          <colgroup><col style="width:44%;"><col style="width:28%;"><col style="width:28%;"></colgroup>
          <thead><tr style="background:#f3f4f6;"><th style="padding:7px 10px; text-align:left; border:1px solid #d1d5db; font-size:11px;">Organism</th><th style="padding:7px 10px; text-align:center; border:1px solid #d1d5db; font-size:11px;">O Antigen (TO)</th><th style="padding:7px 10px; text-align:center; border:1px solid #d1d5db; font-size:11px;">H Antigen (TH)</th></tr></thead>
          <tbody style="font-size:11px;">${tableRows}</tbody>
        </table>
      </td></tr>`;
  }

  if (testType === 'complex_culture' || testType === 'complex_stool_cs') {
    let organism = data.organism || 'Not specified';
    let html = `<tr style="background:#e8f4f0;"><td colspan="4" style="font-weight:bold; padding:7px;">${esc(testName)}</td></tr>
                <tr><td colspan="4" style="padding:6px;"><strong>Organism:</strong> <em>${esc(organism)}</em></td></tr>`;
    if (data.sensitivities && data.sensitivities.length) {
      html += `<tr style="background:#f0f0f0;"><th style="padding:6px;">Antibiotic</th><th style="padding:6px;">Result</th><th style="padding:6px;">Interpretation</th><th style="padding:6px;"></th></tr>`;
      data.sensitivities.forEach(s => {
        const label  = s.result === 'S' ? 'Sensitive' : s.result === 'R' ? 'Resistant' : s.result === 'I' ? 'Intermediate' : s.result || '—';
        const colour = s.result === 'S' ? '#15803d'   : s.result === 'R' ? '#b91c1c'   : s.result === 'I' ? '#92400e'      : '#374151';
        html += `<tr><td style="padding:5px;">${esc(s.antibiotic)}</td><td style="padding:5px; font-weight:bold; color:${colour};">${esc(s.result)}</td><td style="padding:5px; color:${colour};">${label}</td><td></td></tr>`;
      });
    } else {
      html += `<tr><td colspan="4" style="padding:5px; color:#6b7280;">No antibiotic sensitivities recorded.</td></tr>`;
    }
    return html;
  }

  if (testType === 'complex_urine_mcs' || testType === 'complex_stool_mcs') {
    const isMCS = testType === 'complex_urine_mcs';
    const MICRO_PARAMS = isMCS ? URINE_MICRO_PARAMS : STOOL_MICRO_PARAMS;
    const sections = isMCS ? ['Physical','Chemical','Microscopy'] : ['Macroscopy','Microscopy'];
    let html = `<tr style="background:#dbeafe;"><td colspan="4" style="font-weight:bold; padding:8px;">${esc(testName)}</td></tr>`;
    sections.forEach(sec => {
      html += `<tr style="background:#eff6ff;"><td colspan="4" style="font-weight:700; padding:5px 8px; font-size:0.72rem; text-transform:uppercase; letter-spacing:1px;">${sec}</td></tr>`;
      MICRO_PARAMS.filter(p => p.section === sec).forEach(p => {
        let v = data[p.key];
        if (v === undefined || v === '' || v === 'None' || v === 'None seen' || v === 'Absent' || v === 'Negative') return;
        let flag = '';
        if (p.low !== undefined) { let n = parseFloat(v); if (!isNaN(n)) { if (n > p.high) flag = '↑'; else if (n < p.low) flag = '↓'; } }
        html += `<tr><td style="padding:4px 8px;">${esc(p.name)}</td><td style="padding:4px 8px;${flag?'font-weight:bold;color:#b91c1c;':''}">${esc(v)} ${flag}</td><td style="padding:4px 8px;">${esc(p.unit||'')}</td><td>—</td></tr>`;
      });
    });
    html += `<tr style="background:#eff6ff;"><td colspan="4" style="font-weight:700; padding:5px 8px; font-size:0.72rem; text-transform:uppercase; letter-spacing:1px;">Culture &amp; Sensitivity</td></tr>`;
    html += `<tr><td style="padding:4px 8px;">Organism</td><td colspan="3" style="padding:4px 8px; font-style:italic;">${esc(data.organism || 'No growth / Not specified')}</td></tr>`;
    if (data.sensitivities && data.sensitivities.length) {
      html += `<tr style="background:#f0f0f0;"><th style="padding:5px;">Antibiotic</th><th style="padding:5px;">Result</th><th style="padding:5px;">Interpretation</th><th></th></tr>`;
      data.sensitivities.forEach(s => {
        const label  = s.result==='S'?'Sensitive':s.result==='R'?'Resistant':s.result==='I'?'Intermediate':s.result||'—';
        const colour = s.result==='S'?'#15803d':s.result==='R'?'#b91c1c':s.result==='I'?'#92400e':'#374151';
        html += `<tr><td style="padding:5px;">${esc(s.antibiotic)}</td><td style="padding:5px;font-weight:bold;color:${colour};">${esc(s.result)}</td><td style="padding:5px;color:${colour};">${label}</td><td></td></tr>`;
      });
    } else {
      html += `<tr><td colspan="4" style="padding:5px;color:#6b7280;">No antibiotic sensitivities recorded.</td></tr>`;
    }
    return html;
  }

  if (testType === 'complex_malaria') {
    let rows = '';
    if (data.species) rows += `<tr><td>Species</td><td colspan="3">${esc(data.species)}</td></tr>`;
    if (data.stage) rows += `<tr><td>Stage</td><td colspan="3">${esc(data.stage)}</td></tr>`;
    if (data.density !== undefined) rows += `<tr><td>Parasite Density</td><td colspan="3">${esc(data.density)} parasites/µL</td></tr>`;
    return `<tr style="background:#f0f0f0;"><td colspan="4" style="font-weight:bold;">${esc(testName)}</td></tr>${rows}`;
  }

  if (testType === 'complex_tb_genexpert') {
    let rows = '';
    if (data.mtb_detected) rows += `<tr><td>MTB Detected</td><td colspan="3">${esc(data.mtb_detected)}</td></tr>`;
    if (data.rif_resistance) rows += `<tr><td>Rifampicin Resistance</td><td colspan="3">${esc(data.rif_resistance)}</td></tr>`;
    for (let probe of ['probeA_ct','probeB_ct','probeC_ct','probeD_ct','probeE_ct']) {
      if (data[probe] !== undefined) rows += `<tr><td>${probe.replace('_ct',' Probe Ct')}</td><td colspan="3">${esc(data[probe])}</td></tr>`;
    }
    return `<tr style="background:#f0f0f0;"><td colspan="4" style="font-weight:bold;">${esc(testName)}</td></tr>${rows}`;
  }

  if (testType === 'complex_serology') {
    let rows = '';
    for (let p of SEROLOGY_PARAMS) {
      if (data[p.key] !== undefined) rows += `<tr><td>${esc(p.name)}</td><td colspan="3">${esc(data[p.key])}</td></tr>`;
    }
    return `<tr style="background:#f0f0f0;"><td colspan="4" style="font-weight:bold;">${esc(testName)}</td></tr>${rows}`;
  }

  let params = [];
  if (testType === 'complex_cbc') params = CBC_PARAMS;
  else if (testType === 'complex_lft') params = LFT_PARAMS_FULL;
  else if (testType === 'complex_rft') params = RFT_PARAMS_FULL;
  else if (testType === 'complex_thyroid') params = THYROID_PARAMS;
  else if (testType === 'complex_lipid') params = LIPID_PARAMS;
  else if (testType === 'complex_coag') params = COAG_PARAMS;
  else if (testType === 'complex_urinalysis') params = URINALYSIS_MICRO_PARAMS;
  else if (testType === 'complex_iron') params = IRON_PARAMS;
  else if (testType === 'complex_bone') params = BONE_PARAMS;
  else if (testType === 'complex_cardiac') params = CARDIAC_PARAMS;
  else if (testType === 'complex_ogtt') params = OGTT_PARAMS;
  else if (testType === 'complex_csf') params = CSF_PARAMS;
  else if (testType === 'complex_abg') params = ABG_PARAMS;
  else if (testType === 'complex_semen') params = SEMEN_PARAMS;

  if (!params.length) {
    return `<tr><td colspan="4">${esc(testName)}: ${esc(JSON.stringify(data))}</td></tr>`;
  }
  let rows = '';
  for (let p of params) {
    let val = data[p.key];
    if (val === undefined) continue;
    let flag = '';
    let n = parseFloat(val);
    if (!isNaN(n)) {
      if (p.high !== null && n > p.high) flag = '↑';
      if (p.low !== null && n < p.low) flag = '↓';
    }
    let ref = (p.low !== null && p.high !== null) ? `${p.low}–${p.high}` : (p.low !== null ? `≥${p.low}` : p.high !== null ? `≤${p.high}` : '—');
    rows += `<tr><td>${esc(p.name)}</td><td>${val} ${flag}</td><td>${esc(p.unit)}</td><td>${esc(ref)}</td></tr>`;
  }
  return `<tr style="background:#f0f0f0;"><td colspan="4" style="font-weight:bold;">${esc(testName)}</td></tr>${rows}`;
}
