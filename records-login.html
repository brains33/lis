<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MU'UJIZA Records – Secure Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<!-- Security Headers -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self' https://npdopywxemtwzvpummsn.supabase.co https://api.ipify.org https://api64.ipify.org;">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<!-- Reuses the same visual styling as the lab login, but this module
     does not load lab login.js, auth-guard.js, or lab session logic. -->
<link rel="stylesheet" href="login.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo-wrap">🗂️</div>
    <h1>MU'UJIZA RECORDS</h1>
    <p>Patient Registration Module</p>
    <div class="sec-badge">Secure Access Portal</div>
  </div>

  <div class="section-label">Select Your Role</div>
  <div class="roles" id="roleGrid">
    <button class="role-btn wide" data-role="records_officer"><span class="icon">🗂️</span> Records Officer</button>
    <button class="role-btn wide" data-role="records_admin"><span class="icon">⚙️</span> Records Admin</button>
  </div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="usernameInput" placeholder="Enter your username" autocomplete="username" autofocus>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="passwordInput" placeholder="Enter your password" autocomplete="current-password">
      <button class="pw-eye" id="pwEye" type="button" aria-label="Toggle password visibility">👁</button>
    </div>
    <div class="caps-warn" id="capsWarn">⚠ Caps Lock is ON</div>
  </div>

  <div class="attempt-bar" id="attemptBar" style="display:none">
    <div class="attempt-dot" id="dot1"></div>
    <div class="attempt-dot" id="dot2"></div>
    <div class="attempt-dot" id="dot3"></div>
    <div class="attempt-dot" id="dot4"></div>
    <div class="attempt-dot" id="dot5"></div>
    <span class="attempt-label" id="attemptLabel"></span>
  </div>

  <button class="login-btn" id="loginBtn">
    <div class="spinner"></div>
    <span class="btn-text">Sign In Securely</span>
  </button>

  <div class="error-box" id="errorBox"></div>
  <div class="lockout-box" id="lockoutBox">
    🔒 Account temporarily locked after too many failed attempts.
    Try again in <span class="lockout-timer" id="lockoutTimer">—</span>
    <br><small style="opacity:0.75">Lockout lasts 15 minutes to protect this account.</small>
  </div>

  <div class="footer">
    Access is logged. Unauthorized use is prohibited and traceable.
  </div>
</div>

<script src="records-login.js"></script>
</body>
</html>
