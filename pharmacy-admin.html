<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MU'UJIZA Pharmacy – Admin</title>
<meta http-equiv="X-Frame-Options" content="DENY">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pharmacy.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand-name">💊 MU'UJIZA Pharmacy — Admin</div>
    <div class="topbar-user">
      <span id="userLabel"></span>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </div>

  <div class="msg error" id="errorMsg"></div>
  <div class="msg success" id="successMsg"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="stock">Stock <span id="lowStockBadge"></span></button>
    <button class="tab-btn" data-tab="staff">Staff</button>
    <button class="tab-btn" data-tab="history">Dispensing History</button>
  </div>

  <!-- STOCK -->
  <div id="panel-stock" class="panel active">
    <div class="card">
      <div class="card-header">Add New Drug</div>
      <div class="card-body">
        <div class="add-drug-grid">
          <div class="form-group"><label class="form-label">Drug Name *</label><input type="text" id="newDrugName" placeholder="e.g. Paracetamol"></div>
          <div class="form-group"><label class="form-label">Generic Name</label><input type="text" id="newDrugGeneric" placeholder="e.g. Acetaminophen"></div>
          <div class="form-group" style="position:relative;">
            <label class="form-label">Category</label>
            <input type="text" id="newDrugCategory" placeholder="🔍 Search or add category (e.g. Analgesic)" autocomplete="off">
            <div id="categoryDropdown" style="display:none;position:absolute;z-index:20;top:100%;left:0;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;width:100%;max-height:200px;overflow-y:auto;box-shadow:0 8px 20px rgba(42,33,21,.12);margin-top:4px;"></div>
          </div>
          <div class="form-group" style="position:relative;">
            <label class="form-label">Medication Type</label>
            <input type="text" id="newDrugForm" placeholder="🔍 Search or add type (e.g. Tablet)" autocomplete="off">
            <div id="medTypeDropdown" style="display:none;position:absolute;z-index:20;top:100%;left:0;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;width:100%;max-height:200px;overflow-y:auto;box-shadow:0 8px 20px rgba(42,33,21,.12);margin-top:4px;"></div>
          </div>
          <div class="form-group"><label class="form-label">Strength</label><input type="text" id="newDrugStrength" placeholder="e.g. 500mg"></div>
          <div class="form-group"><label class="form-label">Dispensing Unit</label><input type="text" id="newDrugUnit" placeholder="e.g. tablet, bottle, vial"></div>
          <div class="form-group"><label class="form-label">Initial Quantity</label><input type="number" id="newDrugQty" min="0" placeholder="0"></div>
          <div class="form-group"><label class="form-label">Reorder Level</label><input type="number" id="newDrugReorder" min="0" placeholder="10"></div>
          <div class="form-group"><label class="form-label">Unit Price (₦)</label><input type="number" id="newDrugPrice" min="0" step="0.01" placeholder="0.00"></div>
          <div class="form-group"><label class="form-label">Batch Number</label><input type="text" id="newDrugBatch" placeholder="Optional"></div>
          <div class="form-group"><label class="form-label">Expiry Date</label><input type="date" id="newDrugExpiry"></div>
        </div>
        <button class="btn btn-primary" id="addDrugBtn">Add Drug</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Inventory</div>
      <div class="card-body">
        <div class="toolbar">
          <div class="search-bar"><input type="text" id="stockFilter" placeholder="Search drug name..."></div>
        </div>
        <div class="table-wrap" style="overflow-x:auto;">
          <table class="data-table">
            <thead><tr><th>Drug</th><th>Category</th><th>Stock</th><th>Reorder Level</th><th>Unit Price</th><th>Restock</th><th>Status</th></tr></thead>
            <tbody id="stockTbody"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- STAFF -->
  <div id="panel-staff" class="panel">
    <div class="card">
      <div class="card-header">Create Pharmacy Account</div>
      <div class="card-body">
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
          <div class="form-group"><label class="form-label">Username</label><input type="text" id="newUsername" style="width:180px;"></div>
          <div class="form-group"><label class="form-label">Password</label><input type="password" id="newPassword" style="width:180px;"></div>
          <div class="form-group">
            <label class="form-label">Role</label>
            <select id="newRole" style="width:160px;">
              <option value="pharmacist">Pharmacist</option>
              <option value="pharmacy_admin">Pharmacy Admin</option>
            </select>
          </div>
          <button class="btn btn-primary" id="createUserBtn">Create Account</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Pharmacy Staff</div>
      <div class="card-body">
        <div class="table-wrap" style="overflow-x:auto;">
          <table class="data-table">
            <thead><tr><th>Username</th><th>Role</th><th>Status</th><th>Created</th><th>Action</th></tr></thead>
            <tbody id="staffTbody"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="panel-history" class="panel">
    <div class="card">
      <div class="card-header">Dispensing History</div>
      <div class="card-body">
        <div class="toolbar">
          <div class="search-bar"><input type="text" id="historySearch" placeholder="Search hospital no..."></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <input type="date" id="historyDate" style="width:auto;">
            <button class="btn btn-secondary btn-sm" id="searchHistoryBtn">Search</button>
            <button class="btn btn-secondary btn-sm" id="clearHistoryBtn">Reset</button>
          </div>
        </div>
        <div class="table-wrap" style="overflow-x:auto;">
          <table class="data-table">
            <thead><tr><th>Hospital No.</th><th>Prescription</th><th>Status</th><th>Dispensed By</th><th>Dispensed At</th><th>Items</th></tr></thead>
            <tbody id="historyTbody"><tr><td colspan="6" class="empty">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="pharmacy-auth-guard.js"></script>
<script src="pharmacy-admin.js?v=20260702"></script>
</body>
</html>
