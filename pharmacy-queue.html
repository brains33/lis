<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MU'UJIZA Pharmacy – Dispense</title>
<meta http-equiv="X-Frame-Options" content="DENY">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pharmacy.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand-name">💊 MU'UJIZA Pharmacy — Dispense</div>
    <div class="topbar-user">
      <span id="userLabel"></span>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val amber" id="s_pending">—</div><div class="stat-label">Pending Prescriptions</div></div>
    <div class="stat-card"><div class="stat-val green" id="s_dispensed">—</div><div class="stat-label">Dispensed Today</div></div>
  </div>

  <div class="low-stock-banner" id="lowStockBanner"></div>
  <div class="msg error" id="errorMsg"></div>
  <div class="msg success" id="successMsg"></div>

  <div class="main-grid">
    <!-- LEFT: Prescription queue -->
    <div class="card">
      <div class="card-header">Prescription Queue <span class="count" id="queueCount">0</span></div>
      <div class="card-body">
        <div class="rx-search">
          <input type="text" id="rxSearchHospNum" placeholder="Search any hospital no. (e.g. MU-2026-00001)">
          <button class="btn btn-secondary" id="rxSearchBtn">Search</button>
        </div>

        <!-- SETTLE OUTSTANDING BALANCE — same idea as accession's
             collapsible settlement panel: a patient with a Partial/Unpaid
             dispense comes back later to pay off what they owe. -->
        <div style="border:1px solid #e2e8f0;border-radius:10px;margin:10px 0;overflow:hidden;">
          <button type="button" id="settlePanelToggle" style="width:100%;text-align:left;background:#f8fafb;border:none;padding:10px 12px;font-size:0.85rem;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;">
            <span>💰 Settle Outstanding Balance</span>
            <span id="settlePanelChevron" style="transition:transform 0.15s;">▾</span>
          </button>
          <div id="settlePanelBody" style="display:none;padding:12px;">
            <input type="text" id="settleHospNum" placeholder="Hospital number, e.g. MU-2026-00001" style="margin-bottom:8px;">
            <button class="btn btn-secondary" id="settleLookupBtn" style="width:100%;">Look Up Balance</button>
            <div id="settleResultBox" style="display:none;margin-top:10px;"></div>
          </div>
        </div>

        <div class="queue-search">
          <input type="text" id="queueFilter" placeholder="Filter today's queue by hospital no. or diagnosis...">
        </div>
        <div class="queue-list" id="rxQueueList">
          <div class="empty">Loading queue...</div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Dispense panel -->
    <div class="card">
      <div class="card-header">Dispense</div>
      <div class="card-body">
        <div class="placeholder-box" id="placeholder">
          ← Select a prescription from the queue, or search by hospital number
        </div>

        <div class="dispense-content" id="dispenseContent">
          <div class="patient-header" id="patientHeader"></div>

          <label>Doctor's Prescription</label>
          <div class="prescription-box" id="prescriptionText"></div>
          <div id="autoMatchArea" style="margin:8px 0;display:none;">
            <button class="btn-primary" id="autoMatchBtn" style="font-size:0.82rem;">✓ Add All Matched Drugs</button>
            <span id="autoMatchStatus" style="font-size:0.78rem;color:var(--muted);margin-left:8px;"></span>
          </div>

          <div class="allergy-warning" id="allergyWarning"></div>

          <label>Search Drugs</label>
          <input type="text" id="drugSearch" placeholder="Search by drug name or generic name..." style="margin:6px 0 10px;">
          <div class="drug-list" id="drugList"></div>

          <label>Selected for Dispensing</label>
          <div class="selected-drugs" id="selectedDrugs" style="margin-top:6px;"></div>

          <div class="form-group">
            <label class="form-label">Pharmacist Note (optional)</label>
            <textarea id="pharmacistNote" rows="2" placeholder="Counselling notes, substitutions, etc..."></textarea>
          </div>

          <!-- PAYMENT — same shape as accession's cash payment: total is
               computed from the selected drugs, staff types what was
               actually paid, balance + status update live. No Paystack. -->
          <div style="border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin:10px 0;background:#f8fafb;">
            <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:8px;">
              <span>Total</span><strong id="dxTotalAmount">0.00</strong>
            </div>
            <div class="form-group">
              <label class="form-label">Payment Mode</label>
              <select id="dxPayMode">
                <option value="Cash">💵 Cash</option>
                <option value="POS">🏧 POS</option>
                <option value="Transfer">🏦 Transfer</option>
                <option value="NHIS">🏥 NHIS</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Amount Paid</label>
              <input type="number" id="dxAmountPaid" min="0" step="0.01" placeholder="0.00">
            </div>
            <div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-top:4px;">
              <span>Balance Due</span><strong id="dxBalanceDue">0.00</strong>
            </div>
            <span id="dxPayBadge" style="display:inline-block;margin-top:8px;padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:700;">Unpaid</span>
          </div>

          <div class="btn-row">
            <button class="btn-ghost" id="clearDispenseBtn">Clear</button>
            <button class="btn btn-primary" id="submitDispenseBtn">Dispense</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="pharmacy-auth-guard.js"></script>
<script src="pharmacy-queue.js?v=20260702"></script>
</body>
</html>
