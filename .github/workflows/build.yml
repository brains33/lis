name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Pillow
        run: pip install pillow

      - name: Convert PNG to ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('icon-512.png').convert('RGBA')
          img.save('icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          print('icon.ico created successfully')
          "

      - name: Update package.json icon path
        run: |
          $content = Get-Content package.json -Raw
          $content = $content -replace '"icon-512.png"', '"icon.ico"'
          Set-Content package.json $content

      - name: Build Windows EXE
        run: npm run build:win

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: muujiza-lis-windows
          path: dist/
